<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmweb - najwyżej oceniane przez krytyków</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Najwyżej oceniane filmy wg krytyków</h1>
      <button id="toggle-watchlist" class="watchlist-toggle" type="button">
        <span id="watchlist-toggle-label">☆ Moja lista</span>
        (<span id="watchlist-count">0</span>)
      </button>
    </header>

    <main class="layout">
      <aside class="filters">
        <label>
          Rok
          <select id="filter-year">
            <option value="">Wszystkie</option>
          </select>
        </label>

        <label>
          Gatunek
          <select id="filter-genre">
            <option value="">Wszystkie</option>
          </select>
        </label>

        <label>
          Min. liczba ocen
          <input id="filter-min-votes" type="number" min="0" value="0" />
        </label>

        <label>
          Sortuj wg
          <select id="filter-sort">
            <option value="critics_score">Oceny krytyków</option>
            <option value="user_score">Oceny użytkowników</option>
          </select>
        </label>

        <label>
          Kolejność
          <select id="filter-order">
            <option value="desc">Malejąco</option>
            <option value="asc">Rosnąco</option>
          </select>
        </label>
      </aside>

      <section class="results">
        <div id="status" class="status"></div>
        <div id="movie-list" class="movie-grid"></div>
        <div id="scroll-sentinel" class="scroll-sentinel"></div>
        <div id="load-more-status" class="load-more-status"></div>
      </section>
    </main>

    <button id="back-to-filters" class="back-to-filters" type="button">&uarr; Filtry</button>

    <script src="/watchlist.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
